version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: dietrix-db
    environment:
      POSTGRES_DB: ${DB_NAME:-dietrix}
      POSTGRES_USER: ${DB_USERNAME:-dietrix}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dietrix}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dietrix"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: dietrix-app
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-dietrix}
      DB_USERNAME: ${DB_USERNAME:-dietrix}
      DB_PASSWORD: ${DB_PASSWORD:-dietrix}
      JWT_SECRET: ${JWT_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
    ports:
      - "8080:8080"

volumes:
  postgres_data:

